            User: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,

            Trash: () => <svg className="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Warning: () => <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            WhatsApp: () => <svg className="w-6 h-6 text-green-500" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" /></svg>,
            Globe: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        };

        // --- TRANSLATIONS ---
        const translations = {
            ar: {
                searchPlaceholder: 'ابحث عن الأدوية، الفيتامينات، أو المستلزمات...',
                myAccount: 'حسابي',
                cart: 'السلة',
                language: 'English',
            },
            en: {
                searchPlaceholder: 'Search medicines, vitamins...',
                myAccount: 'Account',
                cart: 'Cart',
                language: 'العربية',
            }
        };

        // --- GLOBAL CONTEXT FOR LANGUAGE ---
        const LanguageContext = React.createContext();
        const useLanguage = () => React.useContext(LanguageContext);
        const CartContext = React.createContext();
        const useCart = () => React.useContext(CartContext);

        const AppProvider = ({ children }) => {
            const [lang, setLang] = useState('ar');
            const [cart, setCart] = useState([]);

            useEffect(() => {
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
            }, [lang]);

            const t = translations[lang];

            const toggleLanguage = () => {
                setLang(prev => prev === 'ar' ? 'en' : 'ar');
            };

            const addToCart = (product, quantity = 1) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + quantity } : item);
                    }
                    return [...prev, { ...product, quantity }];
                });
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const updateQuantity = (id, quantity) => {
                if (quantity <= 0) return removeFromCart(id);
                setCart(prev => prev.map(item => item.id === id ? { ...item, quantity } : item));
            };

            const cartTotal = cart.reduce((total, item) => total + item.price * item.quantity, 0);

            return (
                <LanguageContext.Provider value={{ lang, toggleLanguage, t }}>
                    <CartContext.Provider value={{ cart, addToCart, removeFromCart, updateQuantity, cartTotal }}>
                        {children}
                    </CartContext.Provider>
                </LanguageContext.Provider>
            );
        };

        // --- COMPONENTS ---
        const Navbar = () => {
            const { cart } = useCart();
            const { lang, toggleLanguage, t } = useLanguage();
            const navigate = useNavigate();
            const [search, setSearch] = useState('');

            const handleSearch = (e) => {
                e.preventDefault();
                navigate(`/products?search=${search}`);
            };

            return (
                <nav className="bg-white shadow-md sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between h-20 items-center">
                            {/* Logo */}
                            <div className="flex-shrink-0 flex items-center cursor-pointer" onClick={() => navigate('/')}>
                                <div className="text-primary text-2xl font-bold flex items-center gap-2">
                                    <Icons.Menu />
                                    صيدلية سناء أبو زيد
                                </div>
                            </div>

                            {/* Search */}
                            <div className="hidden md:flex flex-1 mx-10">
                                <form onSubmit={handleSearch} className="w-full relative">
                                    <input
                                        type="text"
                                        placeholder={t.searchPlaceholder}
                                        className={`w-full bg-slate-100 border border-transparent focus:border-primary focus:bg-white rounded-full py-3 px-6 ${lang === 'ar' ? 'pr-12' : 'pl-12'} outline-none transition-all`}
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                    />
                                    <button type="submit" className={`absolute ${lang === 'ar' ? 'right-4' : 'left-4'} top-3 text-slate-400`}>
                                        <Icons.Search />
                                    </button>
                                </form>
                            </div>

                            {/* Actions */}
                            <div className="flex items-center gap-6">

                                    <span className="text-xs mt-1 font-bold">{t.language}</span>
                                </button>
                                <Link to="/account" className="text-slate-600 hover:text-primary transition-colors flex flex-col items-center">

                                    <span className="text-xs mt-1">{t.myAccount}</span>
                                </Link>

                                            {cart.length}
                                        </span>
                                    )}

                                </Link>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        const Footer = () => (
            <footer className="bg-dark text-white pt-12 pb-8 mt-16">

                        </p>
                    </div>
                    <div>

                            <li><Link to="/" className="hover:text-primary">الرئيسية</Link></li>
                            <li><Link to="/products" className="hover:text-primary">تسوق الآن</Link></li>
                            <li><Link to="/dashboard" className="hover:text-primary">لوحة التحكم</Link></li>
                            <li><a href="#" className="hover:text-primary">الأسئلة الشائعة</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="font-bold mb-4">التواصل والدعم</h4>
                        <ul className="space-y-2 text-sm text-slate-300">
                            <li>رقم الهاتف: 01285350444
                            </li>
                            <li>البريد: sanaa.abouzaidpharmacy@gmail.com

                            </li>
                            <li>العنوان: القاهرة، مصر</li>
                        </ul>
                    </div>
                    <div>

        const ProductCard = ({ product }) => {
            const { addToCart } = useCart();
            const navigate = useNavigate();

            return (

                        <img src={product.image} alt={product.name} className="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300" />
                        {product.requiresPrescription && (
                            <span className="absolute top-2 right-2 bg-red-100 text-red-600 text-xs px-2 py-1 rounded flex items-center gap-1">
                                <Icons.Warning /> وصفة طبية
                            </span>
                        )}
                    </div>
                    <div className="p-4">
                        <p className="text-xs text-primary font-bold mb-1">{product.category}</p>
                        <h3 className="font-bold text-lg mb-2 cursor-pointer hover:text-primary truncate" onClick={() => navigate(`/product/${product.id}`)}>{product.name}</h3>
                        <div className="flex justify-between items-center mt-4">
                            <span className="text-xl font-bold text-dark">{product.price} <span className="text-sm font-normal text-slate-500">ج.م</span></span>
                            <button
                                onClick={() => addToCart(product)}

                            </button>

        };

        // --- PAGES ---
        const Home = () => {
            const navigate = useNavigate();
            return (
                <div>
                    {/* Hero Banner */}
                    <div className="bg-lightBlue relative overflow-hidden">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 lg:py-32 flex flex-col lg:flex-row items-center">
                            <div className="lg:w-1/2 z-10">
                                <h1 className="text-4xl lg:text-6xl font-extrabold text-dark leading-tight mb-6">
                                    اطلب أدويتك بسهولة وأمان من منزلك
                                </h1>
                                <p className="text-lg text-slate-600 mb-8">
                                    أسرع خدمة توصيل أدوية ومستلزمات طبية في مصر. تسوق الآن وتمتع بخصومات حصرية.
                                </p>
                                <button onClick={() => navigate('/products')} className="bg-primary hover:bg-emerald-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:-translate-y-1 text-lg">
                                    ابدأ التسوق
                                </button>
                            </div>
                            <div className="lg:w-1/2 mt-10 lg:mt-0 relative">
                                <img src="https://images.unsplash.com/photo-1576602976047-174e57a47881?auto=format&fit=crop&w=800&q=80" alt="Pharmacy" className="rounded-2xl shadow-2xl relative z-10" />
                                <div className="absolute top-0 right-0 w-64 h-64 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
                                <div className="absolute bottom-0 left-0 w-64 h-64 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
                            </div>
                        </div>
                    </div>

                    {/* Categories */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                        <h2 className="text-3xl font-bold mb-8 text-center">الأقسام الرئيسية</h2>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                            {categories.map((cat, i) => (
                                <div key={i} onClick={() => navigate(`/products?category=${cat}`)} className="bg-white p-6 rounded-xl shadow-sm text-center cursor-pointer hover:shadow-md hover:border-primary border border-transparent transition-all">
                                    <div className="w-16 h-16 bg-lightBlue rounded-full flex items-center justify-center mx-auto mb-4 text-primary text-2xl">
                                        💊
                                    </div>
                                    <h3 className="font-bold text-sm text-dark">{cat}</h3>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Featured Products */}
                    <div className="bg-white py-16">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-end mb-8">
                                <h2 className="text-3xl font-bold">الأكثر مبيعاً</h2>
                                <Link to="/products" className="text-primary font-bold hover:underline">عرض الكل</Link>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {products.slice(0, 4).map(product => (
                                    <ProductCard key={product.id} product={product} />
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductsList = () => {
            const location = useLocation();
            const searchParams = new URLSearchParams(location.search);
            const categoryFilter = searchParams.get('category');
            const searchFilter = searchParams.get('search');

            let filteredProducts = products;
            if (categoryFilter) {
                filteredProducts = filteredProducts.filter(p => p.category === categoryFilter);
            }
            if (searchFilter) {
                filteredProducts = filteredProducts.filter(p => p.name.includes(searchFilter));
            }

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <h1 className="text-3xl font-bold mb-8">
                        {searchFilter ? `نتائج البحث عن: ${searchFilter}` : categoryFilter ? `قسم: ${categoryFilter}` : 'جميع المنتجات'}
                    </h1>

                    <div className="flex flex-col md:flex-row gap-8">
                        {/* Sidebar */}
                        <div className="md:w-1/4">
                            <div className="bg-white p-6 rounded-xl shadow-sm sticky top-24">
                                <h3 className="font-bold text-lg mb-4 border-b pb-2">التصنيفات</h3>
                                <ul className="space-y-3">
                                    <li>
                                        <Link to="/products" className={`block ${!categoryFilter ? 'text-primary font-bold' : 'text-slate-600 hover:text-primary'}`}>
                                            الكل
                                        </Link>
                                    </li>
                                    {categories.map(cat => (
                                        <li key={cat}>
                                            <Link to={`/products?category=${cat}`} className={`block ${categoryFilter === cat ? 'text-primary font-bold' : 'text-slate-600 hover:text-primary'}`}>
                                                {cat}
                                            </Link>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Grid */}
                        <div className="md:w-3/4">
                            {filteredProducts.length > 0 ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredProducts.map(product => (
                                        <ProductCard key={product.id} product={product} />
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-20">
                                    <p className="text-xl text-slate-500">لا توجد منتجات مطابقة.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ProductDetails = () => {
            const { id } = useParams();
            const { addToCart } = useCart();
            const product = products.find(p => p.id === parseInt(id));
            const [qty, setQty] = useState(1);

            if (!product) return <div className="text-center py-20 text-2xl">المنتج غير موجود</div>;

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col md:flex-row">
                        <div className="md:w-1/2">
                            <img src={product.image} alt={product.name} className="w-full h-[500px] object-cover" />
                        </div>
                        <div className="md:w-1/2 p-10 flex flex-col justify-center">
                            <div className="mb-2 text-primary font-bold">{product.category}</div>
                            <h1 className="text-4xl font-bold mb-4 text-dark">{product.name}</h1>
                            <p className="text-3xl font-bold text-dark mb-6">{product.price} <span className="text-lg font-normal text-slate-500">ج.م</span></p>

                            {product.requiresPrescription && (
                                <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg flex items-start gap-3 mb-6">
                                    <Icons.Warning />
                                    <div>
                                        <h4 className="font-bold">تنبيه: وصفة طبية مطلوبة</h4>
                                        <p className="text-sm mt-1">هذا الدواء يتطلب روشتة طبية. سيُطلب منك رفع صورة الروشتة عند الدفع.</p>
                                    </div>
                                </div>
                            )}

                            <p className="text-slate-600 mb-8 leading-relaxed">{product.description}</p>

                            <div className="flex items-center gap-6 mb-8 border-t border-b py-6">
                                <span className="font-bold">الكمية:</span>
                                <div className="flex items-center border rounded-full overflow-hidden">
                                    <button onClick={() => setQty(Math.max(1, qty - 1))} className="px-4 py-2 bg-slate-100 hover:bg-slate-200">-</button>
                                    <span className="px-4 font-bold w-12 text-center">{qty}</span>
                                    <button onClick={() => setQty(qty + 1)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200">+</button>
                                </div>
                            </div>

                            <button
                                onClick={() => addToCart(product, qty)}
                                className="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-colors text-lg"
                            >
                                <Icons.Cart /> أضف إلى السلة
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Cart = () => {
            const { cart, updateQuantity, removeFromCart, cartTotal } = useCart();
            const navigate = useNavigate();

            if (cart.length === 0) {
                return (
                    <div className="max-w-7xl mx-auto px-4 py-20 text-center">
                        <div className="inline-block p-6 bg-slate-100 rounded-full mb-6">
                            <Icons.Cart className="w-16 h-16 text-slate-400" />
                        </div>
                        <h2 className="text-2xl font-bold mb-4">السلة فارغة</h2>
                        <button onClick={() => navigate('/products')} className="text-primary font-bold hover:underline">تصفح المنتجات</button>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <h1 className="text-3xl font-bold mb-8">سلة المشتريات</h1>
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="lg:w-2/3">
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                {cart.map(item => (
                                    <div key={item.id} className="flex items-center gap-4 border-b py-4 last:border-0">
                                        <img src={item.image} alt={item.name} className="w-20 h-20 object-cover rounded-lg" />
                                        <div className="flex-1">
                                            <h3 className="font-bold text-lg">{item.name}</h3>
                                            <p className="text-primary font-bold">{item.price} ج.م</p>
                                        </div>
                                        <div className="flex items-center border rounded-lg overflow-hidden">
                                            <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="px-3 py-1 bg-slate-100 hover:bg-slate-200">-</button>
                                            <span className="px-3 font-bold">{item.quantity}</span>
                                            <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="px-3 py-1 bg-slate-100 hover:bg-slate-200">+</button>
                                        </div>
                                        <button onClick={() => removeFromCart(item.id)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="lg:w-1/3">
                            <div className="bg-white rounded-xl shadow-sm p-6 sticky top-24">
                                <h3 className="text-xl font-bold mb-6 border-b pb-4">ملخص الطلب</h3>
                                <div className="space-y-3 mb-6">
                                    <div className="flex justify-between">
                                        <span className="text-slate-600">المجموع الفرعي</span>
                                        <span className="font-bold">{cartTotal} ج.م</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-600">التوصيل</span>
                                        <span className="font-bold">مجاناً</span>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center border-t pt-4 mb-8">
                                    <span className="text-lg font-bold">الإجمالي</span>
                                    <span className="text-2xl font-bold text-primary">{cartTotal} ج.م</span>
                                </div>
                                <button onClick={() => navigate('/checkout')} className="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition-colors">
                                    إتمام الطلب
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Checkout = () => {
            const { cartTotal, cart } = useCart();
            const [paymentMethod, setPaymentMethod] = useState('cod');
            const requiresPrescription = cart.some(item => item.requiresPrescription);

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <h1 className="text-3xl font-bold mb-8">إتمام الطلب</h1>
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="lg:w-2/3 space-y-6">

                            {/* Personal Details */}
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                <h2 className="text-xl font-bold mb-4">معلومات التوصيل</h2>
                                <form className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-sm font-bold mb-2">الاسم بالكامل</label>
                                        <input type="text" className="w-full border rounded-lg px-4 py-2 focus:border-primary outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-2">رقم الهاتف</label>
                                        <input type="tel" className="w-full border rounded-lg px-4 py-2 focus:border-primary outline-none" required />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="block text-sm font-bold mb-2">العنوان بالتفصيل</label>
                                        <textarea className="w-full border rounded-lg px-4 py-2 focus:border-primary outline-none" rows="3" required></textarea>
                                    </div>
                                </form>
                            </div>

                            {/* Prescription Upload */}
                            {requiresPrescription && (
                                <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-yellow-500">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icons.Warning /> رفع الروشتة الطبية</h2>
                                    <p className="text-sm text-slate-600 mb-4">يحتوي طلبك على أدوية تستلزم وصفة طبية، يرجى رفع صورة الروشتة.</p>
                                    <input type="file" accept="image/*" className="w-full border rounded-lg p-2" />
                                </div>
                            )}

                            {/* Payment Methods */}
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                <h2 className="text-xl font-bold mb-4">طريقة الدفع</h2>
                                <div className="space-y-3">
                                    <label className={`flex items-center gap-3 p-4 border rounded-lg cursor-pointer ${paymentMethod === 'cod' ? 'border-primary bg-emerald-50' : ''}`}>
                                        <input type="radio" name="payment" checked={paymentMethod === 'cod'} onChange={() => setPaymentMethod('cod')} className="w-5 h-5 text-primary" />
                                        <span className="font-bold">الدفع عند الاستلام (Cash on Delivery)</span>
                                    </label>
                                    <label className={`flex items-center gap-3 p-4 border rounded-lg cursor-pointer ${paymentMethod === 'vodafone' ? 'border-primary bg-emerald-50' : ''}`}>
                                        <input type="radio" name="payment" checked={paymentMethod === 'vodafone'} onChange={() => setPaymentMethod('vodafone')} className="w-5 h-5 text-primary" />
                                        <span className="font-bold">فودافون كاش</span>
                                    </label>
                                    <label className={`flex items-center gap-3 p-4 border rounded-lg cursor-pointer ${paymentMethod === 'card' ? 'border-primary bg-emerald-50' : ''}`}>
                                        <input type="radio" name="payment" checked={paymentMethod === 'card'} onChange={() => setPaymentMethod('card')} className="w-5 h-5 text-primary" />
                                        <span className="font-bold">بطاقة بنكية (Credit/Debit Card)</span>
                                    </label>
                                </div>
                            </div>

                        </div>

                        <div className="lg:w-1/3">
                            <div className="bg-white rounded-xl shadow-sm p-6 sticky top-24">
                                <h3 className="text-xl font-bold mb-6 border-b pb-4">الإجمالي الكلي</h3>
                                <div className="text-3xl font-bold text-primary mb-8 text-center">{cartTotal} ج.م</div>
                                <button className="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition-colors text-lg shadow-lg">
                                    تأكيد الطلب
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <h1 className="text-3xl font-bold mb-8">لوحة تحكم الإدارة</h1>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-slate-500 mb-2">إجمالي المبيعات</h3>
                            <p className="text-3xl font-bold">14,500 ج.م</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-slate-500 mb-2">الطلبات الجديدة</h3>
                            <p className="text-3xl font-bold text-secondary">24</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-slate-500 mb-2">العملاء</h3>
                            <p className="text-3xl font-bold text-primary">156</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm">
                            <h3 className="text-slate-500 mb-2">المنتجات النشطة</h3>
                            <p className="text-3xl font-bold">482</p>
                        </div>
                    </div>

                    <div className="mt-8 bg-white rounded-xl shadow-sm p-6">
                        <h2 className="text-xl font-bold mb-6">أحدث الطلبات</h2>
                        <div className="overflow-x-auto">
                            <table className="w-full text-right">
                                <thead>
                                    <tr className="border-b text-slate-500">
                                        <th className="pb-3 font-normal">رقم الطلب</th>
                                        <th className="pb-3 font-normal">العميل</th>
                                        <th className="pb-3 font-normal">التاريخ</th>
                                        <th className="pb-3 font-normal">الإجمالي</th>
                                        <th className="pb-3 font-normal">الحالة</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr className="border-b">
                                        <td className="py-4">#ORD-1024</td>
                                        <td>أحمد محمد</td>
                                        <td>اليوم</td>
                                        <td>450 ج.م</td>
                                        <td><span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs">قيد المعالجة</span></td>
                                    </tr>
                                    <tr className="border-b">
                                        <td className="py-4">#ORD-1023</td>
                                        <td>سارة محمود</td>
                                        <td>أمس</td>
                                        <td>1200 ج.م</td>
                                        <td><span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs">مكتمل</span></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const WhatsAppBtn = () => (
            <a href="https://wa.me/201012345678" target="_blank" rel="noreferrer" className="fixed bottom-6 right-6 bg-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform z-50 flex items-center justify-center">
                <Icons.WhatsApp />
            </a>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            return (
                <AppProvider>
                    <HashRouter>
                        <div className="min-h-screen flex flex-col">
                            <Navbar />
                            <main className="flex-grow">
                                <Routes>
                                    <Route path="/" element={<Home />} />
                                    <Route path="/products" element={<ProductsList />} />
                                    <Route path="/product/:id" element={<ProductDetails />} />
                                    <Route path="/cart" element={<Cart />} />
                                    <Route path="/checkout" element={<Checkout />} />
                                    <Route path="/dashboard" element={<Dashboard />} />
                                    <Route path="*" element={<div className="text-center py-20 text-2xl font-bold">الصفحة غير موجودة</div>} />
                                </Routes>
                            </main>
                            <Footer />
                            <WhatsAppBtn />
                        </div>
                    </HashRouter>
                </AppProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
